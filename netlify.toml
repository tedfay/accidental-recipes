# ── Build ─────────────────────────────────────────────────────────
[build]
  command = "npm run build"
  publish = ".next"

# ── Security response headers (2FI-167) ──────────────────────────
# CSP allows: Google Fonts (gstatic), GA4, GTM, Sentry.
# Next.js App Router requires 'unsafe-inline' for both scripts and styles.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cross-Origin-Opener-Policy = "same-origin"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.sentry.io; img-src 'self' data: https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self'; frame-src 'none'"

